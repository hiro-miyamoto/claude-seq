function borrowSlider(k,label,min,max,step){
  return '<div class="prm"><label>'+label+'</label>'
    +'<input type="range" min="'+min+'" max="'+max+'" step="'+step+'" value="'+BORROW[k]+'" oninput="setBorrowParam(\''+k+'\',this.value)">'
    +'<span class="pv" id="pv_b_'+k+'">'+fmt(BORROW[k])+'</span></div>';
}
function toggleArc(){
  TENS.on = TENS.on? 0 : 1;
  // the whole structure changes (single loop <-> multi-section arc), so any
  // per-voice loop windows now point at stale beats — clear them.
  LOOPWIN.lower=null; LOOPWIN.inner=null; LOOPWIN.upper=null;
  updateToggleBtns();
  regen();   // arc on/off changes whole structure
}
function updateToggleBtns(){
  const c=document.getElementById('chordToggle');
  if(c){ c.textContent='和声 '+(LOW.mode?'●':'○'); c.classList.toggle('hi',!!LOW.mode); }
  const a=document.getElementById('arcToggle');
  if(a){ a.textContent='緊張 '+(TENS.on?'●':'○'); a.classList.toggle('hi',!!TENS.on); }
}

const NOTE_NAMES_SHARP=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
function degName(d){ const root=getRoot(); return NOTE_NAMES_SHARP[((root+d)%12+12)%12]; }
function buildNPBoard(){
  const board=document.getElementById('npboard'); if(!board) return;
  const degs=getScale();
  if(Object.keys(NP.weight).length!==degs.length) npReset(degs);
  // global row
  let h='<div class="npglob"><span class="ttl">音の個性 — 指紋</span>'
    +npGlob('leap','順次 ←→ 跳躍',0,1,0.05)
    +npGlob('restWeight','中心の引力',0,2,0.05)
    +npGlob('pakadOn','癖 on/off',0,1,1)
    +npGlob('pakadFreq','癖の頻度',0,1,0.05)
    +'<div class="monwrap"><div class="monttl">MIDI モニター</div><div id="midiMon" class="midimon"></div></div>'
    +'</div>';
  // wide grid: columns = [note] + one per degree; rows = attributes
  const n=degs.length;
  const attrs=[['weight','重み',0,2,0.05],['center','中心',0,1,0.05],['ascAvoid','↑避',0,1,0.05],['descAvoid','↓避',0,1,0.05],['octaveBias','8va',-1,1,0.1]];
  h+='<div class="npgrid" style="grid-template-columns:54px repeat('+n+',1fr)">';
  // header row: note names
  h+='<div class="gh"></div>';
  degs.forEach(function(d,i){ h+='<div class="gh" style="font-size:.74rem;color:var(--mel)">'+degName(d)+'<br><span style="font-size:.62rem;color:var(--inner);font-style:normal">ST'+d+'</span></div>'; });
  // each attribute row
  attrs.forEach(function(a){
    h+='<div class="rn">'+a[1]+'</div>';
    degs.forEach(function(d,i){
      const val=NP[a[0]][i]!=null?NP[a[0]][i]:0;
      h+='<div class="cell">'
        +'<input type="range" min="'+a[2]+'" max="'+a[3]+'" step="'+a[4]+'" value="'+val+'" '
          +'oninput="setNP('+i+',\''+a[0]+'\',this.value);this.nextElementSibling.textContent=(Math.round(this.value*100)/100)">'
        +'<span class="cv">'+(Math.round(val*100)/100)+'</span>'
        +'</div>';
    });
  });
  h+='</div>';
  board.innerHTML=h;
}
function npGlob(key,label,min,max,step){
  const val=NP[key];
  return '<span class="gctl"><label>'+label+'</label>'
    +'<input type="range" min="'+min+'" max="'+max+'" step="'+step+'" value="'+val+'" '
    +'oninput="setNPGlobalLive(\''+key+'\',this.value,this.nextElementSibling)">'
    +'<span class="cv" style="font-size:.5rem;color:var(--dim);width:24px">'+fmt(val)+'</span></span>';
}
function setNPGlobalLive(key,val,span){ NP[key]=parseFloat(val); if(span)span.textContent=fmt(NP[key]); regenKeepHistory('upper'); }
function npGlobalRow(key,label,min,max,step){
  const val=NP[key];
  return '<div class="prm" id="prm_np_'+key+'">'
    +'<label>'+label+'</label>'
    +'<input type="range" min="'+min+'" max="'+max+'" step="'+step+'" value="'+val+'" oninput="setNPGlobal(\''+key+'\',this.value)">'
    +'<span class="pv" id="pv_np_'+key+'">'+fmt(val)+'</span>'
    +'<div class="stepper"><button onclick="stepNPGlobal(\''+key+'\',-1,'+step+','+min+','+max+')">−</button>'
    +'<button onclick="stepNPGlobal(\''+key+'\',1,'+step+','+min+','+max+')">+</button></div></div>';
}
function npMini(i,attr,min,max,step,glyph){
  const val=NP[attr][i]!=null?NP[attr][i]:0;
  return '<span style="display:inline-flex;align-items:center;gap:1px" title="'+attr+'">'
    +'<span style="font-size:.5rem;color:var(--dim)">'+glyph+'</span>'
    +'<input type="range" style="width:34px;height:2px" min="'+min+'" max="'+max+'" step="'+step+'" value="'+val+'" '
    +'oninput="setNP('+i+',\''+attr+'\',this.value)"></span>';
}
function setNP(i,attr,val){ NP[attr][i]=parseFloat(val); regenKeepHistory('upper'); }
function setNPGlobal(key,val){ NP[key]=parseFloat(val); const pv=document.getElementById('pv_np_'+key); if(pv)pv.textContent=fmt(NP[key]); regenKeepHistory('upper'); }
function stepNPGlobal(key,dir,step,min,max){ NP[key]=Math.max(min,Math.min(max,Math.round((NP[key]+dir*step)*1000)/1000)); const sl=document.querySelector('#prm_np_'+key+' input[type=range]'); if(sl)sl.value=NP[key]; const pv=document.getElementById('pv_np_'+key); if(pv)pv.textContent=fmt(NP[key]); regenKeepHistory('upper'); }

function populateScales(){
  const sel=document.getElementById('scale'); if(!sel)return;
  let html='';
  SCALE_GROUPS.forEach(function(g){
    html+='<optgroup label="'+g[0]+'">';
    g[1].forEach(function(k){ if(SCALES[k]) html+='<option value="'+k+'"'+(k==='dorian'?' selected':'')+'>'+(SCALE_LABELS[k]||k)+'</option>'; });
    html+='</optgroup>';
  });
  sel.innerHTML=html;
  sel.value='dorian';
}

// ── init ──
window.addEventListener('resize',function(){draw(playing?playBeat:-1);});
document.addEventListener('keydown',function(e){
  if((e.metaKey||e.ctrlKey) && e.key.toLowerCase()==='z'){
    e.preventDefault();
    if(e.shiftKey) redo(); else undo();
  }
});
populateScales();
populateFeel();
populateChordColors();
updateToggleBtns();
document.getElementById('root').value='9';   // A — a Gismonti-ish home
regen();
initMIDI();
</script>
</body>
</html>
